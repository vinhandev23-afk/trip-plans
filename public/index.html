<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Plans</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">🗺️ Trip Plans</div>
        <button class="btn-new" id="btn-new">+ Trip</button>
      </div>
      <div class="trips-list" id="trips-list">
        <div class="loading">Loading…</div>
      </div>
    </aside>

    <main class="main" id="main">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🏝️</div>
        <h2>Chọn một chuyến đi</h2>
        <p>Hoặc tạo kế hoạch mới để bắt đầu</p>
        <button class="btn-primary" id="btn-new-empty">+ Tạo Trip Mới</button>
      </div>
    </main>
  </div>

  <!-- New Trip Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2>✈️ Tạo Trip Mới</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form class="modal-form" id="new-trip-form">
        <div class="form-row">
          <label>Tên chuyến đi *</label>
          <input name="title" placeholder="VD: Road Trip Tây Nguyên 2026" required autocomplete="off">
        </div>
        <div class="form-row">
          <label>Tên thư mục *</label>
          <input name="name" placeholder="VD: tay-nguyen-2026" required autocomplete="off">
          <span class="form-hint">Tự động từ tên — có thể sửa</span>
        </div>
        <div class="form-row two-col">
          <div>
            <label>Ngày bắt đầu</label>
            <input name="start_date" placeholder="VD: 1/9/2026">
          </div>
          <div>
            <label>Ngày kết thúc</label>
            <input name="end_date" placeholder="VD: 7/9/2026">
          </div>
        </div>
        <div class="form-row two-col">
          <div>
            <label>Thời gian</label>
            <input name="duration" placeholder="VD: 7 ngày 6 đêm">
          </div>
          <div>
            <label>Số người</label>
            <input name="people" type="number" placeholder="2" value="2" min="1">
          </div>
        </div>
        <div class="form-row two-col">
          <div>
            <label>Phương tiện</label>
            <input name="transport" placeholder="xe máy / ô tô / máy bay">
          </div>
          <div>
            <label>Quãng đường</label>
            <input name="km" placeholder="VD: 1,350km">
          </div>
        </div>
        <div class="form-row">
          <label>Budget (~/ người)</label>
          <input name="budget" placeholder="VD: 3.5 triệu">
        </div>
        <div class="form-row">
          <label>Ý tưởng / Mô tả lộ trình</label>
          <textarea name="idea" rows="3" placeholder="SG → Phan Rang → Quy Nhơn → Nha Trang → Đà Lạt → SG..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btn-cancel">Hủy</button>
          <button type="submit" class="btn-primary">Tạo Trip →</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
